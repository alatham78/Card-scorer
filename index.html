<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Scorer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Card Scorer</h1>
    <div class="game-controls">
      <select id="game-select" aria-label="Select game"></select>
      <button id="new-game-btn" type="button">New game</button>
      <button id="rename-game-btn" type="button" class="secondary">Rename</button>
      <button id="delete-game-btn" type="button" class="danger">Delete game</button>
    </div>
  </header>

  <main id="game-view" hidden>
    <section class="players-section">
      <h2>Players</h2>
      <form id="add-player-form" class="inline-form">
        <input id="player-name-input" type="text" placeholder="Player name" autocomplete="off" maxlength="40" />
        <button type="submit">Add player</button>
      </form>
    </section>

    <section class="scoreboard-section">
      <div class="scoreboard-header">
        <h2>Scoreboard</h2>
        <button id="add-round-btn" type="button">Add round</button>
      </div>
      <div class="table-wrap">
        <table id="scoreboard">
          <thead></thead>
          <tbody></tbody>
          <tfoot></tfoot>
        </table>
      </div>
      <p id="empty-hint" class="hint"></p>
    </section>
  </main>

  <div id="no-game-view" class="empty-state">
    <p>No game yet. Create one to start scoring.</p>
    <button id="first-game-btn" type="button">Create your first game</button>
  </div>

  <!-- Round editor modal -->
  <div id="round-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="round-modal-title">
      <h3 id="round-modal-title">Round</h3>
      <form id="round-form">
        <div id="round-inputs" class="round-inputs"></div>
        <div class="modal-actions">
          <button type="button" id="round-cancel-btn" class="secondary">Cancel</button>
          <button type="button" id="round-delete-btn" class="danger" hidden>Delete round</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
